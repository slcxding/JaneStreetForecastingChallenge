# XGBoost baseline hyperparameters

model_type: xgboost

params:
  objective: reg:squarederror
  eval_metric: rmse
  verbosity: 0
  n_estimators: 1000
  learning_rate: 0.05
  max_depth: 6
  min_child_weight: 50
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1
  tree_method: hist      # "hist" is fast on CPU; use "gpu_hist" for GPU

early_stopping:
  enabled: true
  rounds: 100
  verbose: false

feature_importance:
  type: gain
  top_n: 50
