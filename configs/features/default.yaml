# Feature engineering configuration
#
# Column naming note: lag.parquet contains responder_*_lag_1 (previous calendar
# day). The Kaggle inference API provides them as responder_*_lag_0. Both refer
# to "most recent prior observation" — only the suffix differs by context.
# Use the suffix that matches your data source here.

# Additional lag features (beyond the lag_1 columns already in lag.parquet)
lag:
  enabled: true
  # Compute extra lags from these columns (e.g. lag_2, lag_4 = 2 and 4 steps back)
  columns:
    - responder_0_lag_1
    - responder_6_lag_1
  # Steps back to generate (lag_1 already exists, so these are truly additional)
  windows: [2, 4]

# Rolling statistics (per symbol, over time_id steps)
rolling:
  enabled: true
  # Subset of features to roll (full 79 × n_windows × n_stats = ~500+ cols)
  columns:
    - feature_00
    - feature_01
    - feature_02
    - feature_03
    - feature_04
    - feature_05
    - feature_06
    - feature_07
    - feature_08
    - feature_09
    - responder_0_lag_1
    - responder_6_lag_1
  windows: [5, 10, 20]
  # Supported: mean, std, min, max, zscore
  # Note: "skew" is intentionally omitted — naive implementation was mislabelled
  stats: [mean, std]

# Cross-sectional features (rank within each time_id across symbols)
cross_sectional:
  enabled: true
  columns:
    - feature_00
    - feature_01
    - feature_02
    - responder_6_lag_1
  # Polars rank methods: average | min | max | dense | ordinal | random
  rank_method: average
  normalize: true   # z-score after ranking → approximately normal distribution

# Output
output:
  path: data/processed/features.parquet
  include_raw_features: true
